<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐻 신나는 파닉스 놀이 🎈</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FFF6E9;
            --ink: #5D4037;
            --accent: #FF8A65;
            --card: #FFFFFF;
            --dash: #FFCCBC;
            --btn: #FFB74D;
            --sky: #81D4FA;
            --money: #FFD54F;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --balloon-good: #4FC3F7;
            --balloon-trap: #FF7043;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100dvh;
            font-family: 'Jua', sans-serif;
            background:
                radial-gradient(circle at 12% 18%, #FFE0B2 0%, transparent 42%),
                radial-gradient(circle at 88% 12%, #B3E5FC 0%, transparent 38%),
                var(--bg);
            color: var(--ink);
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 16px;
            padding-top: max(12px, env(safe-area-inset-top));
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            border-bottom: 3px dashed var(--dash);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            font-size: clamp(1rem, 3.5vw, 1.25rem);
            color: var(--accent);
            white-space: nowrap;
            background: none;
            border: none;
            font-family: inherit;
            cursor: pointer;
            padding: 0;
        }

        .money-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(180deg, #FFF8E1, #FFECB3);
            border: 3px solid var(--money);
            border-radius: 999px;
            padding: 6px 14px 6px 8px;
            font-size: clamp(1rem, 3.5vw, 1.2rem);
            box-shadow: 0 3px 10px rgba(255, 193, 7, 0.25);
        }

        .money-badge .coin {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #FFF59D, #FFC107 55%, #FF8F00);
            display: grid;
            place-items: center;
            font-size: 0.85rem;
            border: 2px solid #FFB300;
            flex-shrink: 0;
        }

        .money-badge .money-value {
            min-width: 1.5ch;
            font-variant-numeric: tabular-nums;
        }

        .money-badge.pop { animation: moneyPop 0.45s ease; }

        @keyframes moneyPop {
            0% { transform: scale(1); }
            40% { transform: scale(1.12); }
            100% { transform: scale(1); }
        }

        .screens {
            flex: 1;
            width: 100%;
            max-width: 720px;
            margin: 0 auto;
            padding: 24px 16px calc(24px + var(--safe-bottom));
        }

        .screen {
            display: none;
            animation: fadeIn 0.35s ease;
        }

        .screen.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--card);
            border-radius: 28px;
            padding: clamp(20px, 5vw, 36px);
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
            border: 4px dashed var(--dash);
            text-align: center;
        }

        .hero-title {
            margin: 0 0 8px;
            font-size: clamp(1.6rem, 6vw, 2.6rem);
            color: var(--accent);
            text-shadow: 2px 2px #FFE0B2;
            line-height: 1.2;
        }

        .hero-sub {
            margin: 0 0 20px;
            font-size: clamp(1rem, 3.5vw, 1.2rem);
            color: #8D6E63;
            line-height: 1.4;
        }

        .mascot {
            font-size: clamp(3rem, 12vw, 4.5rem);
            line-height: 1;
            margin-bottom: 8px;
            animation: bounceSoft 2.4s ease-in-out infinite;
        }

        @keyframes bounceSoft {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        label.field-label {
            display: block;
            margin-bottom: 10px;
            font-size: 1.15rem;
            color: #6D4C41;
        }

        /* 모바일 줌 방지: 16px 이상 */
        input[type="text"] {
            width: 100%;
            max-width: 420px;
            padding: 14px 16px;
            font-size: 18px;
            border: 3px solid var(--sky);
            border-radius: 18px;
            outline: none;
            text-align: center;
            font-family: 'Jua', sans-serif;
            color: var(--ink);
            background: #FAFAFA;
        }

        input[type="text"]:focus {
            border-color: #4FC3F7;
            box-shadow: 0 0 0 4px rgba(79, 195, 247, 0.25);
            background: #fff;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
            cursor: pointer;
            font-family: 'Jua', sans-serif;
            border-radius: 24px;
            padding: 14px 28px;
            font-size: clamp(1.05rem, 3.5vw, 1.3rem);
            transition: transform 0.15s, box-shadow 0.15s;
            min-height: 48px;
        }

        .btn:active { transform: scale(0.97); }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary {
            background: var(--btn);
            color: #fff;
            box-shadow: 0 5px 15px rgba(255, 183, 77, 0.4);
            width: 100%;
            max-width: 300px;
            margin-top: 14px;
        }

        .btn-primary:hover:not(:disabled) { transform: scale(1.03); }

        .btn-secondary {
            background: #81D4FA;
            color: #01579B;
            box-shadow: 0 5px 15px rgba(129, 212, 250, 0.35);
            width: 100%;
            max-width: 300px;
            margin-top: 10px;
        }

        .btn-ghost {
            background: transparent;
            color: #A1887F;
            font-size: 0.95rem;
            padding: 8px 12px;
            margin-top: 8px;
        }

        .name-chip {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #F3E5F5;
            border: 3px solid #CE93D8;
            border-radius: 999px;
            padding: 12px 22px;
            font-size: clamp(1.35rem, 5vw, 1.9rem);
            color: #6A1B9A;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 4px 14px rgba(186, 104, 200, 0.25);
            margin: 8px 0 16px;
            font-family: inherit;
        }

        .name-chip:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 18px rgba(186, 104, 200, 0.35);
        }

        .hint { margin: 0; font-size: 1rem; color: #A1887F; }
        .error-msg {
            color: #E53935;
            font-size: 0.95rem;
            min-height: 1.4em;
            margin: 8px 0 0;
        }

        .stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .nav-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            width: 100%;
            margin-top: 8px;
        }

        .word-chips {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
            min-height: 2rem;
            width: 100%;
        }

        .word-chip {
            background: #E8F5E9;
            border: 2px solid #81C784;
            color: #2E7D32;
            border-radius: 999px;
            padding: 6px 14px;
            font-size: 1rem;
        }

        /* ── Stage 1: 풍선 ── */
        .stage-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 12px;
            width: 100%;
        }

        .stage-badge {
            background: #E3F2FD;
            color: #1565C0;
            border: 2px solid #90CAF9;
            border-radius: 999px;
            padding: 4px 12px;
            font-size: 0.95rem;
        }

        .progress-text {
            font-size: 1rem;
            color: #8D6E63;
        }

        .target-word {
            font-size: clamp(1.5rem, 5vw, 2rem);
            color: #5E35B1;
            margin: 4px 0 8px;
            letter-spacing: 0.08em;
        }

        .guide-text {
            margin: 0 0 16px;
            font-size: 1.05rem;
            color: #8D6E63;
        }

        .balloon-sky {
            position: relative;
            width: 100%;
            min-height: 320px;
            background:
                linear-gradient(180deg, #E1F5FE 0%, #B3E5FC 55%, #E0F7FA 100%);
            border-radius: 24px;
            border: 3px solid #81D4FA;
            overflow: hidden;
            padding: 20px 10px 28px;
            z-index: 1;
            isolation: isolate;
        }

        .balloon-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: clamp(14px, 3.5vw, 24px);
            min-height: 260px;
            position: relative;
            z-index: 2;
        }

        .balloon {
            --b-color: var(--balloon-good);
            /* 아이들이 터치하기 쉬운 큰 풍선 */
            width: clamp(110px, 28vw, 150px);
            height: clamp(130px, 33vw, 175px);
            border: none;
            background: transparent;
            padding: 0;
            cursor: pointer;
            position: relative;
            z-index: 3;
            font-family: inherit;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            appearance: none;
            -webkit-appearance: none;
        }

        .balloon:focus-visible {
            outline: 3px solid #5E35B1;
            outline-offset: 4px;
            border-radius: 12px;
        }

        /* 떠다니는 움직임은 안쪽에만 → 버튼 히트영역/active transform 안정화 */
        .balloon-inner {
            display: block;
            width: 100%;
            height: 100%;
            animation: floatY 2.8s ease-in-out infinite;
            pointer-events: none;
            transform-origin: center bottom;
            transition: transform 0.12s ease, filter 0.12s ease;
        }

        .balloon:nth-child(2n) .balloon-inner { animation-duration: 3.2s; animation-delay: -0.4s; }
        .balloon:nth-child(3n) .balloon-inner { animation-duration: 2.6s; animation-delay: -1s; }

        .balloon .bubble {
            width: 100%;
            height: 78%;
            border-radius: 50% 50% 45% 45%;
            background: radial-gradient(circle at 30% 28%, #fff 0%, var(--b-color) 42%, color-mix(in srgb, var(--b-color) 70%, #000) 100%);
            display: grid;
            place-items: center;
            color: #fff;
            /* 기존 대비 0.8배 — 여백과 함께 중앙 정렬 */
            font-size: clamp(2.4rem, 8vw, 3.4rem);
            font-weight: 700;
            line-height: 1;
            letter-spacing: 0.02em;
            text-shadow: 0 2px 4px rgba(0,0,0,0.28);
            box-shadow: inset -4px -8px 12px rgba(0,0,0,0.12), 0 6px 14px rgba(0,0,0,0.12);
            position: relative;
            pointer-events: none;
            transition: filter 0.12s ease, box-shadow 0.12s ease;
            padding: 12px 14px 16px;
            box-sizing: border-box;
        }

        .balloon .bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 7px solid transparent;
            border-right: 7px solid transparent;
            border-top: 10px solid color-mix(in srgb, var(--b-color) 80%, #000);
            pointer-events: none;
        }

        .balloon .string {
            width: 2px;
            height: 18%;
            margin: 10px auto 0;
            background: #90A4AE;
            pointer-events: none;
        }

        .balloon.is-good { --b-color: #4FC3F7; }
        .balloon.is-trap { --b-color: #FF7043; }
        .balloon.is-trap.alt { --b-color: #FFCA28; }
        .balloon.is-trap.alt .bubble { color: #5D4037; }
        .balloon.is-trap.alt2 { --b-color: #EC407A; }

        /* 클릭/터치 시각 피드백 */
        .balloon.is-pressed .balloon-inner,
        .balloon:active .balloon-inner {
            animation: none;
            transform: scale(1.18);
            filter: brightness(1.15);
        }

        .balloon.is-pressed .bubble,
        .balloon:active .bubble {
            box-shadow:
                inset -2px -4px 8px rgba(0,0,0,0.1),
                0 0 0 4px rgba(255, 255, 255, 0.65),
                0 8px 18px rgba(0,0,0,0.18);
            filter: saturate(1.25);
        }

        .balloon.burst {
            pointer-events: none;
            z-index: 1;
        }

        .balloon.burst .balloon-inner {
            animation: burstPop 0.45s forwards;
        }

        .balloon.wrong-shake .balloon-inner {
            animation: shakeX 0.45s ease;
        }

        @keyframes floatY {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes burstPop {
            0% { transform: scale(1); opacity: 1; }
            40% { transform: scale(1.35); opacity: 0.9; }
            100% { transform: scale(0); opacity: 0; }
        }

        @keyframes shakeX {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px) rotate(-4deg); }
            40% { transform: translateX(8px) rotate(4deg); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(6px); }
        }

        .blend-trail {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: stretch;
            gap: 12px;
            margin-top: 18px;
            min-height: 72px;
            width: 100%;
        }

        .blend-chip {
            background: #C8E6C9;
            border: 3px solid #2E7D32;
            color: #1B5E20;
            border-radius: 16px;
            padding: 12px 20px;
            min-width: 3.2em;
            min-height: 2.6em;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            /* 기존 1.2rem → 2배 */
            font-size: 2.4rem;
            font-weight: bold;
            line-height: 1;
            letter-spacing: 0.04em;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.45);
            box-shadow: 0 3px 0 #81C784, 0 6px 12px rgba(46, 125, 50, 0.2);
            animation: fadeIn 0.25s ease;
            box-sizing: border-box;
        }

        /* 축하 오버레이 */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(93, 64, 55, 0.45);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .overlay.show { display: flex; }

        .overlay-card {
            background: #fff;
            border-radius: 28px;
            padding: 28px 24px;
            max-width: 360px;
            width: 100%;
            text-align: center;
            border: 4px dashed #FFCCBC;
            box-shadow: 0 16px 40px rgba(0,0,0,0.2);
            animation: fadeIn 0.3s ease;
        }

        .overlay-card .big { font-size: 3rem; margin-bottom: 8px; }

        /* 단계 내부 정답 플래시 (자동 진행) */
        .correct-flash {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 220;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            background: rgba(255, 248, 225, 0.35);
        }

        .correct-flash.show { display: flex; }

        .correct-flash-inner {
            text-align: center;
            animation: correctPop 0.8s ease forwards;
        }

        .correct-flash-text {
            display: block;
            font-size: clamp(3.2rem, 14vw, 5.5rem);
            font-weight: 900;
            color: #FF6F00;
            text-shadow:
                0 4px 0 #FFE082,
                0 8px 18px rgba(255, 111, 0, 0.35),
                0 0 24px rgba(255, 235, 59, 0.6);
            letter-spacing: 0.06em;
            line-height: 1.1;
        }

        .correct-flash-stars {
            font-size: clamp(1.8rem, 6vw, 2.6rem);
            display: block;
            margin-top: 6px;
        }

        @keyframes correctPop {
            0% { transform: scale(0.4) rotate(-8deg); opacity: 0; }
            25% { transform: scale(1.15) rotate(3deg); opacity: 1; }
            55% { transform: scale(1) rotate(0deg); opacity: 1; }
            100% { transform: scale(1.05); opacity: 0; }
        }

        /* 폭죽 */
        .confetti-layer {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            border-radius: inherit;
        }

        .confetti-piece {
            position: absolute;
            top: -12px;
            width: 10px;
            height: 14px;
            border-radius: 2px;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0.2; }
        }

        .overlay.stage-clear .overlay-card {
            border-color: #FFD54F;
            box-shadow: 0 16px 40px rgba(255, 193, 7, 0.35);
        }

        /* ── Stage 2: 그림 매칭 ── */
        .match-picture-wrap {
            width: 100%;
            max-width: 320px;
            margin: 0 auto 16px;
            aspect-ratio: 1;
            border-radius: 28px;
            background:
                radial-gradient(circle at 30% 25%, #FFF9C4 0%, transparent 45%),
                linear-gradient(160deg, #E1F5FE, #FCE4EC 55%, #E8F5E9);
            border: 4px solid #90CAF9;
            display: grid;
            place-items: center;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 -8px 20px rgba(255,255,255,0.4), 0 8px 20px rgba(0,0,0,0.06);
        }

        .match-picture-wrap .pic-emoji {
            font-size: clamp(4.5rem, 22vw, 7rem);
            line-height: 1;
            filter: drop-shadow(0 6px 10px rgba(0,0,0,0.12));
            animation: bounceSoft 2.8s ease-in-out infinite;
            user-select: none;
        }

        .match-picture-wrap .pic-fallback {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 16px;
        }

        .match-picture-wrap .pic-fallback .letter {
            width: 96px;
            height: 96px;
            border-radius: 28px;
            display: grid;
            place-items: center;
            font-size: 3rem;
            color: #fff;
            background: linear-gradient(145deg, #FF8A65, #FFB74D);
            box-shadow: 0 8px 18px rgba(255, 138, 101, 0.35);
        }

        .match-picture-wrap .pic-fallback .hint-word {
            font-size: 1rem;
            color: #8D6E63;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .match-hear-btn {
            position: absolute;
            right: 10px;
            bottom: 10px;
            border: none;
            background: rgba(255,255,255,0.9);
            border-radius: 999px;
            width: 44px;
            height: 44px;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            font-family: inherit;
        }

        .match-choices {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
        }

        .match-choice {
            border: 3px solid #CE93D8;
            background: #F3E5F5;
            color: #6A1B9A;
            border-radius: 18px;
            padding: 14px 10px;
            font-size: clamp(1.15rem, 4vw, 1.4rem);
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.15s, background 0.15s, border-color 0.15s;
            min-height: 56px;
            touch-action: manipulation;
        }

        .match-choice:hover:not(:disabled) {
            transform: scale(1.04);
            background: #E1BEE7;
        }

        .match-choice.correct {
            border-color: #66BB6A;
            background: #C8E6C9;
            color: #2E7D32;
        }

        .match-choice.wrong {
            border-color: #EF5350;
            background: #FFCDD2;
            color: #C62828;
            animation: shakeX 0.45s ease;
        }

        .match-choice:disabled { cursor: default; opacity: 0.85; }

        .coming-soon { padding: 24px 8px; color: #8D6E63; }
        .coming-soon .icon { font-size: 3rem; margin-bottom: 8px; }

        /* ── Stage 3: 철자 완성 ── */
        .spell-hint-pic {
            font-size: clamp(2.8rem, 12vw, 4rem);
            line-height: 1;
            margin: 4px 0 14px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }

        .spell-slots {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 0 auto;
            width: 100%;
            max-width: 460px;
        }

        .spell-slot {
            width: clamp(48px, 12vw, 64px);
            height: clamp(56px, 14vw, 72px);
            border-radius: 14px;
            display: grid;
            place-items: center;
            font-size: clamp(1.6rem, 5vw, 2.1rem);
            font-weight: bold;
            line-height: 1;
            box-sizing: border-box;
            transition: transform 0.12s ease, background 0.15s ease;
        }

        .spell-slot.is-given {
            background: #E3F2FD;
            border: 3px solid #42A5F5;
            color: #1565C0;
        }

        .spell-slot.is-blank {
            background: #FFF8E1;
            border: 3px dashed #FF9800;
            color: #E65100;
            box-shadow: inset 0 2px 0 rgba(255,255,255,0.8), 0 4px 0 #FFCC80;
        }

        .spell-slot.is-blank.is-active {
            border-style: solid;
            border-color: #FF6D00;
            background: #FFE0B2;
            box-shadow: 0 0 0 4px rgba(255, 152, 0, 0.35), 0 4px 0 #FFB74D;
            animation: blankPulse 1.2s ease-in-out infinite;
        }

        .spell-slot.is-blank.is-empty::before {
            content: '_';
            opacity: 0.55;
            font-weight: 700;
        }

        .spell-slot.is-filled {
            background: #C8E6C9;
            border: 3px solid #43A047;
            color: #1B5E20;
            animation: fadeIn 0.2s ease;
        }

        .spell-slot.wrong-shake {
            animation: shakeX 0.45s ease;
        }

        @keyframes blankPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* 단어 ↔ 보기 사이 안내 */
        .spell-pick-hint {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 22px 0 14px;
            user-select: none;
        }

        .spell-pick-hint .arrow-up {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(180deg, #FFF59D, #FFD54F);
            border: 3px solid #FFB300;
            color: #E65100;
            font-size: 1.5rem;
            font-weight: 900;
            line-height: 1;
            box-shadow: 0 4px 0 #FFCA28, 0 8px 14px rgba(255, 179, 0, 0.35);
            animation: arrowBounce 1.1s ease-in-out infinite;
        }

        .spell-pick-hint .pick-text {
            font-size: clamp(1.05rem, 3.5vw, 1.25rem);
            color: #EF6C00;
            font-weight: bold;
            background: #FFF3E0;
            border: 2px solid #FFB74D;
            border-radius: 999px;
            padding: 6px 14px;
        }

        @keyframes arrowBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .spell-choices-panel {
            width: 100%;
            max-width: 460px;
            margin: 0 auto 8px;
            padding: 18px 14px 16px;
            background: #F5F5F5;
            border: 3px dashed #BDBDBD;
            border-radius: 22px;
            box-shadow: inset 0 1px 0 #fff;
        }

        .spell-choices {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            width: 100%;
            margin: 0 auto;
        }

        .spell-choice {
            width: clamp(56px, 14vw, 72px);
            height: clamp(56px, 14vw, 72px);
            border-radius: 18px;
            border: 3px solid #9E9E9E;
            background: linear-gradient(180deg, #FAFAFA, #EEEEEE);
            color: #424242;
            font-size: clamp(1.5rem, 5vw, 2rem);
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            touch-action: manipulation;
            transition: transform 0.12s ease, background 0.12s ease;
            box-shadow: 0 4px 0 #BDBDBD;
        }

        .spell-choice:hover:not(:disabled) {
            transform: scale(1.08);
            background: #E0E0E0;
            border-color: #757575;
        }

        .spell-choice:active:not(:disabled) {
            transform: scale(0.96);
            box-shadow: 0 1px 0 #BDBDBD;
        }

        .spell-choice:disabled {
            opacity: 0.45;
            cursor: default;
            transform: none;
        }

        .spell-choice.wrong {
            border-color: #EF5350;
            background: #FFCDD2;
            color: #C62828;
            animation: shakeX 0.45s ease;
        }

        @media (max-width: 480px) {
            .screens { padding: 16px 12px calc(16px + var(--safe-bottom)); }
            .card {

    <script>
        /* =========================================================
         * Storage
         * ========================================================= */
        const Storage = (() => {
            const KEY = 'phonics-game-v1';

            const defaults = () => ({
                playerName: '',
                money: 0,
                words: [],
                stage: 'home',
                progress: {
                    currentWordIndex: 0,
                    matchWordIndex: 0,
                    spellWordIndex: 0,
                    spellBlankLevel: 1,
                    stage1Done: false,
                    stage2Done: false,
                    stage3Done: false
                }
            });

            function load() {
                try {
                    const raw = localStorage.getItem(KEY);
                    if (!raw) return defaults();
                    const parsed = JSON.parse(raw);
                    return {
                        ...defaults(),
                        ...parsed,
                        progress: { ...defaults().progress, ...(parsed.progress || {}) }
                    };
                } catch {
                    return defaults();
                }
            }

            function save(data) {
                try {
                    localStorage.setItem(KEY, JSON.stringify(data));
                } catch (err) {
                    console.warn('저장 실패:', err);
                }
            }

            return { KEY, defaults, load, save };
        })();

        let state = Storage.load();

        function persist() {
            Storage.save(state);
        }

        /* =========================================================
         * TTS — 시스템 기본에 가깝되, 발랄한 여자아이 톤
         * speakWhole() 호출 시마다 여성 보이스 + pitch 설정을 적용
         * ========================================================= */
        const TTS = (() => {
            // 시스템 기본 rate에 가깝게, pitch만 올려 발랄한 여자아이 느낌
            const RATE = 1.0;
            const PITCH = 1.35;
            let preferredVoice = null;

            // 요청된 우선 키워드 (앞에서부터 강한 우선순위)
            const PRIORITY_KEYWORDS = [
                'Google US English',
                'Samantha',
                'Karen',
                'female',
                'woman'
            ];

            const MALE_HINT = /male|\bman\b|boy|david|mark|george|ravi|james|daniel|matthew|guy|tony|injoon|bongjin|andrew|brian|fred/i;

            function findPreferredVoice(voices) {
                if (!voices.length) return null;

                // 1) 지정 키워드 순서대로 영어/여성 보이스 검색
                for (const keyword of PRIORITY_KEYWORDS) {
                    const hit = voices.find(v => {
                        const name = v.name || '';
                        if (!name.toLowerCase().includes(keyword.toLowerCase())) return false;
                        if (MALE_HINT.test(name)) return false;
                        return true;
                    });
                    if (hit) return hit;
                }

                // 2) Google 한국어 + 여성
                const googleKoFemale = voices.find(v => {
                    const name = v.name || '';
                    const isKo = /^ko([-_]|$)/i.test(v.lang) || /한국어|korean/i.test(name);
                    const isGoogle = /google/i.test(name);
                    const isFemale = /female|woman|여성/i.test(name) || (!MALE_HINT.test(name) && /google/i.test(name) && isKo);
                    return isKo && isGoogle && isFemale && !MALE_HINT.test(name);
                });
                if (googleKoFemale) return googleKoFemale;

                // 3) 그 외 female/woman 표기 영어
                const anyFemaleEn = voices.find(v =>
                    /^en([-_]|$)/i.test(v.lang) &&
                    /female|woman/i.test(v.name) &&
                    !MALE_HINT.test(v.name)
                );
                if (anyFemaleEn) return anyFemaleEn;

                // 4) 시스템 기본(default) 영어 — 남자명만 아니면 허용
                const defaultEn = voices.find(v =>
                    v.default && /^en([-_]|$)/i.test(v.lang) && !MALE_HINT.test(v.name)
                );
                if (defaultEn) return defaultEn;

                return voices.find(v => /^en([-_]|$)/i.test(v.lang) && !MALE_HINT.test(v.name))
                    || voices.find(v => !MALE_HINT.test(v.name))
                    || voices[0]
                    || null;
            }

            function initVoices() {
                if (!('speechSynthesis' in window)) return;
                const voices = speechSynthesis.getVoices();
                if (!voices.length) return;
                preferredVoice = findPreferredVoice(voices);
            }

            /**
             * 전체/부분 발음 공통 — 여성 보이스 + 발랄한 pitch를 항상 적용
             * (기존 speakWhole 역할을 TTS.speakWhole / TTS.speak 가 담당)
             */
            function speakWhole(text, opts = {}) {
                if (!('speechSynthesis' in window)) return Promise.resolve();

                // 보이스가 아직 안 올라온 브라우저 대비
                if (!preferredVoice) initVoices();

                return new Promise(resolve => {
                    speechSynthesis.cancel();

                    const u = new SpeechSynthesisUtterance(String(text));
                    u.lang = opts.lang || 'en-US';
                    u.rate = opts.rate != null ? opts.rate : RATE;
                    u.pitch = opts.pitch != null ? opts.pitch : PITCH;
                    u.volume = 1;

                    if (preferredVoice) {
                        u.voice = preferredVoice;
                        if (!opts.lang && preferredVoice.lang) {
                            // 영어 보이스면 해당 lang, 한국어 보이스여도 파닉스는 en-US 유지
                            if (/^en([-_]|$)/i.test(preferredVoice.lang)) {
                                u.lang = preferredVoice.lang;
                            }
                        }
                    }

                    u.onend = () => resolve();
                    u.onerror = () => resolve();
                    speechSynthesis.speak(u);
                });
            }

            // 하위 호환: speak === speakWhole
            function speak(text, opts) {
                return speakWhole(text, opts);
            }

            if ('speechSynthesis' in window) {
                initVoices();
                speechSynthesis.onvoiceschanged = initVoices;
            }

            return {
                speak,
                speakWhole,
                initVoices,
                getVoice: () => preferredVoice,
                RATE,
                PITCH
            };
        })();

        /* =========================================================
         * SFX (팡 소리)
         * ========================================================= */
        const SFX = (() => {
            let ctx = null;

            function getCtx() {
                if (!ctx) {
                    const AC = window.AudioContext || window.webkitAudioContext;
                    if (!AC) return null;
                    ctx = new AC();
                }
                return ctx;
            }

            function popBang() {
                const audio = getCtx();
                if (!audio) return;
                if (audio.state === 'suspended') audio.resume();

                const t0 = audio.currentTime;
                const osc = audio.createOscillator();
                const gain = audio.createGain();
                const filter = audio.createBiquadFilter();

                osc.type = 'square';
                osc.frequency.setValueAtTime(180, t0);
                osc.frequency.exponentialRampToValueAtTime(40, t0 + 0.18);

                filter.type = 'lowpass';
                filter.frequency.value = 900;

                gain.gain.setValueAtTime(0.0001, t0);
                gain.gain.exponentialRampToValueAtTime(0.35, t0 + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.22);

                osc.connect(filter);
                filter.connect(gain);
                gain.connect(audio.destination);
                osc.start(t0);
                osc.stop(t0 + 0.25);
            }

            function successChime() {
                const audio = getCtx();
                if (!audio) return;
                if (audio.state === 'suspended') audio.resume();

                [523, 659, 784].forEach((freq, i) => {
                    const t0 = audio.currentTime + i * 0.1;
                    const osc = audio.createOscillator();
                    const gain = audio.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.0001, t0);
                    gain.gain.exponentialRampToValueAtTime(0.2, t0 + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.25);
                    osc.connect(gain);
                    gain.connect(audio.destination);
                    osc.start(t0);
                    osc.stop(t0 + 0.28);
                });
            }

            /** 단계 내부 정답용 — 짧고 경쾌한 딩동 */
            function correctDing() {
                const audio = getCtx();
                if (!audio) return;
                if (audio.state === 'suspended') audio.resume();

                [784, 1046].forEach((freq, i) => {
                    const t0 = audio.currentTime + i * 0.07;
                    const osc = audio.createOscillator();
                    const gain = audio.createGain();
                    osc.type = 'triangle';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.0001, t0);
                    gain.gain.exponentialRampToValueAtTime(0.28, t0 + 0.015);
                    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.2);
                    osc.connect(gain);
                    gain.connect(audio.destination);
                    osc.start(t0);
                    osc.stop(t0 + 0.22);
                });
            }

            /** 스테이지 클리어용 팡파레 */
            function fanfare() {
                const audio = getCtx();
                if (!audio) return;
                if (audio.state === 'suspended') audio.resume();

                [523, 659, 784, 1046].forEach((freq, i) => {
                    const t0 = audio.currentTime + i * 0.12;
                    const osc = audio.createOscillator();
                    const gain = audio.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.0001, t0);
                    gain.gain.exponentialRampToValueAtTime(0.22, t0 + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.35);
                    osc.connect(gain);
                    gain.connect(audio.destination);
                    osc.start(t0);
                    osc.stop(t0 + 0.4);
                });
            }

            return { popBang, successChime, correctDing, fanfare };
        })();

        /* =========================================================
         * Feedback — 단계 내부 자동 정답 / 스테이지 전환(확인)
         * ========================================================= */
        const Feedback = (() => {
            const FLASH_MS = 800;
            const flashEl = document.getElementById('correctFlash');
            const overlay = document.getElementById('celebrateOverlay');
            const confettiLayer = document.getElementById('confettiLayer');

            function flashCorrect(onDone) {
                return new Promise(resolve => {

        /* =========================================================
         * Phonics helpers
         * ========================================================= */
        const Phonics = (() => {
            const REGEX = /(igh|tch|dge)|(ar|er|ir|or|ur)|(ee|ea|ai|ay|oa|ow|ou|oo|oi|oy|au|aw|ew)|(sh|ch|th|wh|ph|ck|ng|qu)|([aeiou])|([^aeiou])/g;

            function tokenize(word) {
                const tokens = [];
                let match;
                REGEX.lastIndex = 0;
                while ((match = REGEX.exec(word)) !== null) {
                    tokens.push(match[0]);
                }
                return tokens;
            }

            function parseWords(text) {
                const seen = new Set();
                const words = [];
                text.split(/\s+/).forEach(part => {
                    const clean = part.replace(/[^a-zA-Z]/g, '').toLowerCase();
                    if (clean && !seen.has(clean)) {
                        seen.add(clean);
                        words.push(clean);
                    }
                });
                return words;
            }

            const TRAP_LETTERS = 'bdfgjklmnpqrstvwxyz'.split('');

            function makeTrapLabel(correctSet) {
                let letter;
                let tries = 0;
                do {
                    letter = TRAP_LETTERS[Math.floor(Math.random() * TRAP_LETTERS.length)];
                    tries += 1;
                } while (correctSet.has(letter) && tries < 20);
                return letter;
            }

            /** 정답 풍선 + 함정 풍선 섞기 */
            function buildBalloonItems(tokens) {
                const correctSet = new Set(tokens.map(t => t.toLowerCase()));
                const items = tokens.map((text, order) => ({
                    id: `good-${order}-${text}`,
                    text,
                    kind: 'good',
                    order
                }));

                const trapCount = Math.min(3, Math.max(2, tokens.length));
                for (let i = 0; i < trapCount; i++) {
                    items.push({
                        id: `trap-${i}-${Math.random().toString(36).slice(2, 6)}`,
                        text: makeTrapLabel(correctSet),
                        kind: 'trap',
                        order: -1,
                        trapStyle: i % 3 === 0 ? '' : i % 3 === 1 ? 'alt' : 'alt2'
                    });
                }

                return shuffle(items);
            }

            function shuffle(arr) {
                const a = arr.slice();
                for (let i = a.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [a[i], a[j]] = [a[j], a[i]];
                }
                return a;
            }

            return { tokenize, parseWords, buildBalloonItems, shuffle };
        })();

            function go(screenId, opts = {}) {
                if (!screens[screenId]) return;
                Object.values(screens).forEach(el => el.classList.remove('active'));
                screens[screenId].classList.add('active');
                state.stage = screenId;
                persist();
                if (opts.onEnter) opts.onEnter();

            function boot() {
                if (!state.playerName) {
                    go('name');
                    return;
                }
                const restoreable = ['home', 'words', 'stage1', 'stage2', 'stage3'];
                if (restoreable.includes(state.stage) && state.stage !== 'name') {
                    if (state.stage === 'stage1' && state.words.length) {
                        go('stage1', { onEnter: () => Stage1.start(state.progress.currentWordIndex || 0) });
                    } else if (state.stage === 'stage2' && state.words.length) {
                        go('stage2', { onEnter: () => Stage2.start(state.progress.matchWordIndex || 0) });
                    } else if (state.stage === 'stage3' && state.words.length) {
                        go('stage3', {
                            onEnter: () => Stage3.start(
                                state.progress.spellWordIndex || 0,
                                state.progress.spellBlankLevel || 1
                            )
                        });
                    } else if (state.stage === 'words') {
                        go('words', { onEnter: () => WordsScreen.sync() });
                    } else {
                        go(state.stage === 'name' ? 'home' : state.stage);
                    }
                } else {

                }

        /* =========================================================
         * Stage 1 — Balloon Blending Game
         * ========================================================= */
        const Stage1 = (() => {
            const grid = document.getElementById('balloonGrid');
            const trail = document.getElementById('blendTrail');
            const wordLabel = document.getElementById('stage1WordLabel');
            const progressEl = document.getElementById('stage1Progress');
            const guideEl = document.getElementById('stage1Guide');

            let tokens = [];
            let nextIndex = 0;
            let roundLocked = false; // 단어 완료 처리 중에만 잠금
            let currentWord = '';

            function currentWords() {
                return state.words || [];
            }

            function updateHeader() {
                const words = currentWords();
                const i = state.progress.currentWordIndex;
                progressEl.textContent = `${i + 1} / ${words.length}`;
                wordLabel.textContent = currentWord;
                guideEl.innerHTML = '파란 풍선을 <strong>순서대로</strong> 터뜨려 보세요! (주황·분홍은 함정!)';
            }

            function renderTrail() {
                trail.innerHTML = '';
                tokens.slice(0, nextIndex).forEach(t => {
                    const chip = document.createElement('span');
                    chip.className = 'blend-chip';
                    chip.textContent = t;
                    trail.appendChild(chip);
                });
            }

            function bindBalloonPointer(btn, item) {
                let lastFireAt = 0;
                const TAP_GAP_MS = 260;

                const pressOn = () => {
                    if (btn.classList.contains('burst') || roundLocked) return;
                    btn.classList.add('is-pressed');
                };
                const pressOff = () => btn.classList.remove('is-pressed');

                const fire = (e) => {
                    if (e.cancelable) e.preventDefault();
                    e.stopPropagation();
                    pressOff();

                    if (btn.classList.contains('burst') || roundLocked) return;
                    if (btn.dataset.consumed === '1') return;

                    const now = Date.now();
                    if (now - lastFireAt < TAP_GAP_MS) return;
                    lastFireAt = now;

                    onBalloonTap(btn, item);
                };

                btn.addEventListener('pointerdown', (e) => {
                    if (e.button != null && e.button !== 0) return;
                    pressOn();
                });
                btn.addEventListener('pointerup', fire);
                btn.addEventListener('pointercancel', pressOff);
                btn.addEventListener('pointerleave', pressOff);
                // 구형 터치 브라우저 보완
                btn.addEventListener('touchstart', pressOn, { passive: true });
                btn.addEventListener('touchend', fire, { passive: false });
            }

            function createBalloon(item) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'balloon ' + (item.kind === 'good' ? 'is-good' : `is-trap ${item.trapStyle || ''}`);
                btn.dataset.id = item.id;
                btn.dataset.kind = item.kind;
                btn.dataset.order = String(item.order);
                btn.dataset.text = item.text;
                btn.setAttribute('aria-label', item.kind === 'good' ? `소리 ${item.text}` : `함정 ${item.text}`);

                const inner = document.createElement('span');
                inner.className = 'balloon-inner';
                inner.innerHTML = `
                    <span class="bubble">${item.text}</span>
                    <span class="string" aria-hidden="true"></span>
                `;
                btn.appendChild(inner);

                bindBalloonPointer(btn, item);
                return btn;
            }

            function setupRound(word) {
                currentWord = word;
                tokens = Phonics.tokenize(word);
                nextIndex = 0;
                roundLocked = false;
                updateHeader();
                renderTrail();

                const items = Phonics.buildBalloonItems(tokens);
                grid.innerHTML = '';
                items.forEach(item => grid.appendChild(createBalloon(item)));
            }

            function start(wordIndex = 0) {
                const words = currentWords();
                if (!words.length) {
                    Router.go('words', { onEnter: () => WordsScreen.sync() });
                    return;
                }
                const idx = Math.min(Math.max(0, wordIndex), words.length - 1);
                state.progress.currentWordIndex = idx;
                persist();
                setupRound(words[idx]);
            }

            function onBalloonTap(btn, item) {
                if (roundLocked || btn.classList.contains('burst')) return;

                if (item.kind === 'trap') {
                    handleTrap(btn);
                    return;
                }

                if (item.order !== nextIndex) {
                    handleWrongOrder(btn);
                    return;
                }

                roundLocked = true;
                btn.dataset.consumed = '1';
                btn.classList.add('burst');
                nextIndex += 1;
                renderTrail();
                TTS.speak(item.text);

                Feedback.flashCorrect(() => {
                    if (nextIndex >= tokens.length) {
                        finishWord();
                    } else {
                        roundLocked = false;
                    }
                });
            }

            function handleTrap(btn) {
                SFX.popBang();
                btn.classList.remove('is-pressed');
                btn.classList.add('wrong-shake');
                setTimeout(() => btn.classList.remove('wrong-shake'), 450);
                TTS.speak('bang', { rate: 1, pitch: 0.8 });
            }

            function handleWrongOrder(btn) {
                SFX.popBang();
                btn.classList.remove('is-pressed');
                btn.classList.add('wrong-shake');
                setTimeout(() => btn.classList.remove('wrong-shake'), 450);
            }

            async function finishWord() {
                await TTS.speak(currentWord);
                addMoney(REWARD.WORD_CLEAR);

                const words = currentWords();
                const idx = state.progress.currentWordIndex;
                const isLast = idx >= words.length - 1;

                if (isLast) {
                    state.progress.stage1Done = true;
                    persist();
                    addMoney(REWARD.STAGE1_CLEAR);
                    Feedback.showStageClear({
                        title: '1단계 완료!',
                        message: `모든 단어를 다 했어요! +${REWARD.WORD_CLEAR + REWARD.STAGE1_CLEAR} 머니 💰`,
                        emoji: '🎆',
                        buttonLabel: '확인',
                        onConfirm: () => {
                            roundLocked = false;
                            Router.go('stage2', { onEnter: () => Stage2.start(0) });
                        }
                    });
                } else {
                    state.progress.currentWordIndex = idx + 1;
                    persist();
                    roundLocked = false;
                    start(idx + 1);
                }
            }

            function bind() {
                document.getElementById('stage1RestartBtn').addEventListener('click', () => {
                    start(state.progress.currentWordIndex);
                });
                document.getElementById('stage1ToWordsBtn').addEventListener('click', () => {
                    Router.go('words', { onEnter: () => WordsScreen.sync() });
                });
            }

            return { start, bind };
        })();

                    wrap.innerHTML = `
                        <div class="letter">${(word[0] || '?').toUpperCase()}</div>
                        <div class="hint-word" aria-hidden="true">${'★'.repeat(Math.min(word.length, 6))}</div>
                    `;
                    container.appendChild(wrap);
                }

                const hear = document.createElement('button');
                hear.type = 'button';
                hear.className = 'match-hear-btn';
                hear.id = 'matchHearBtn';
                hear.title = '힌트 듣기';
                hear.setAttribute('aria-label', '힌트 듣기');
                hear.textContent = '🔊';
                container.appendChild(hear);
                return hear;
            }

            function pickDistractors(answer, count, fromWords) {
                const pool = Phonics.shuffle([
                    ...new Set([
                        ...(fromWords || []).filter(w => w !== answer),
                        ...DECOYS.filter(w => w !== answer)
                    ])
                ]);
                return pool.slice(0, count);
            }

            return { get, renderInto, pickDistractors, MAP };
        })();

        /* =========================================================
         * Stage 2 — Picture Matching
         * ========================================================= */
        const Stage2 = (() => {
            const pictureEl = document.getElementById('matchPicture');
            const choicesEl = document.getElementById('matchChoices');
            const progressEl = document.getElementById('stage2Progress');
            const guideEl = document.getElementById('stage2Guide');

            let currentWord = '';
            let busy = false;

            function currentWords() {
                return state.words || [];
            }

            function setupRound(word) {
                currentWord = word;
                busy = false;
                const words = currentWords();
                const idx = state.progress.matchWordIndex || 0;
                progressEl.textContent = `${idx + 1} / ${words.length}`;
                guideEl.textContent = '그림을 보고 알맞은 단어를 골라 보세요!';

                const hearBtn = WordPictures.renderInto(pictureEl, word);
                hearBtn.addEventListener('click', () => {
                    // 힌트: 첫 소리만 살짝 (정답 전체는 말하지 않음)
                    const tokens = Phonics.tokenize(word);
                    TTS.speak(tokens[0] || word[0]);
                });

                const distractors = WordPictures.pickDistractors(word, 3, words);
                const options = Phonics.shuffle([word, ...distractors]).slice(0, 4);

                choicesEl.innerHTML = '';
                options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'match-choice';
                    btn.textContent = opt;
                    btn.addEventListener('click', () => onChoice(btn, opt));
                    choicesEl.appendChild(btn);
                });
            }

            function start(wordIndex = 0) {
                const words = currentWords();
                if (!words.length) {
                    Router.go('words', { onEnter: () => WordsScreen.sync() });
                    return;
                }
                const idx = Math.min(Math.max(0, wordIndex), words.length - 1);
                state.progress.matchWordIndex = idx;
                persist();
                setupRound(words[idx]);
            }

            async function onChoice(btn, opt) {
                if (busy) return;

                if (opt !== currentWord) {
                    SFX.popBang();
                    btn.classList.add('wrong');
                    btn.disabled = true;
                    setTimeout(() => btn.classList.remove('wrong'), 450);
                    return;
                }

                busy = true;
                [...choicesEl.querySelectorAll('.match-choice')].forEach(b => {
                    b.disabled = true;
                    if (b.textContent === currentWord) b.classList.add('correct');
                });

                TTS.speak(currentWord);
                addMoney(REWARD.MATCH_CLEAR);

                const words = currentWords();
                const idx = state.progress.matchWordIndex || 0;
                const isLast = idx >= words.length - 1;

                await Feedback.flashCorrect();

                if (isLast) {
                    state.progress.stage2Done = true;
                    persist();
                    addMoney(REWARD.STAGE2_CLEAR);
                    Feedback.showStageClear({
                        title: '2단계 완료!',
                        message: `그림 매칭 성공! +${REWARD.MATCH_CLEAR + REWARD.STAGE2_CLEAR} 머니 💰`,
                        emoji: '🎆',
                        buttonLabel: '확인',
                        onConfirm: () => {
                            busy = false;
                            Router.go('stage3', { onEnter: () => Stage3.start(0, 1) });
                        }
                    });
                } else {
                    state.progress.matchWordIndex = idx + 1;
                    persist();
                    busy = false;
                    start(idx + 1);
                }
            }

            function bind() {
                document.getElementById('stage2RestartBtn').addEventListener('click', () => {
                    start(state.progress.matchWordIndex || 0);
                });
                document.getElementById('stage2ToWordsBtn').addEventListener('click', () => {
                    Router.go('words', { onEnter: () => WordsScreen.sync() });
                });
                document.getElementById('stage2HomeBtn').addEventListener('click', () => Router.go('home'));
            }

            return { start, bind };
        })();

        /* =========================================================
         * Stage 3 — Spelling Fill (철자 완성)
         * 단어 길이 N → 빈칸 1개 ~ N개까지 N라운드
         * ========================================================= */
        const Stage3 = (() => {
            const slotsEl = document.getElementById('spellSlots');
            const choicesEl = document.getElementById('spellChoices');
            const progressEl = document.getElementById('stage3Progress');
            const hintPic = document.getElementById('spellHintPic');

            const TRAP_POOL = 'abcdefghijklmnopqrstuvwxyz'.split('');

            let currentWord = '';
            let blankLevel = 1;
            let blankSet = new Set();
            let filled = new Set();
            let busy = false;

            function currentWords() {
                return state.words || [];
            }

            function pickBlankPositions(length, count) {
                const idxs = Array.from({ length }, (_, i) => i);
                const shuffled = Phonics.shuffle(idxs);
                return new Set(shuffled.slice(0, Math.min(count, length)));
            }

            function nextBlankIndex() {
                const ordered = [...blankSet].sort((a, b) => a - b);
                return ordered.find(i => !filled.has(i));
            }

            function buildTrapLetters(neededLetters) {
                const needed = new Set(neededLetters.map(c => c.toLowerCase()));
                const traps = [];
                const pool = Phonics.shuffle(TRAP_POOL.filter(c => !needed.has(c)));
                const trapCount = 2 + Math.floor(Math.random() * 2);
                for (let i = 0; i < trapCount && i < pool.length; i++) {
                    traps.push(pool[i]);
                }
                return traps;
            }

            function updateHeader() {
                const words = currentWords();
                const wi = state.progress.spellWordIndex || 0;
                progressEl.textContent = `단어 ${wi + 1}/${words.length}`;
                hintPic.textContent = WordPictures.get(currentWord) || '✏️';
            }

            function renderSlots() {
                slotsEl.innerHTML = '';
                const active = nextBlankIndex();

                currentWord.split('').forEach((ch, i) => {
                    const slot = document.createElement('div');
                    slot.className = 'spell-slot';
                    slot.dataset.index = String(i);

                    if (!blankSet.has(i)) {
                        slot.classList.add('is-given');
                        slot.textContent = ch;
                    } else if (filled.has(i)) {
                        slot.classList.add('is-filled');
                        slot.textContent = ch;
                    } else {
                        slot.classList.add('is-blank', 'is-empty');
                        if (i === active) slot.classList.add('is-active');
                        slot.setAttribute('aria-label', '빈칸');
                    }

                    slotsEl.appendChild(slot);
                });
            }

            function renderChoices() {
                choicesEl.innerHTML = '';
                const needed = [...blankSet]
                    .filter(i => !filled.has(i))
                    .map(i => currentWord[i]);

                const uniqueNeeded = [...new Set(needed)];
                const traps = buildTrapLetters(uniqueNeeded);
                const options = Phonics.shuffle([...uniqueNeeded, ...traps]);

                options.forEach(letter => {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'spell-choice';
                    btn.textContent = letter;
                    btn.setAttribute('aria-label', `글자 ${letter}`);
                    btn.addEventListener('click', () => onChoice(btn, letter));
                    choicesEl.appendChild(btn);
                });
            }

            function setupLevel(word, level) {
                currentWord = word;
                blankLevel = Math.min(Math.max(1, level), word.length);
                blankSet = pickBlankPositions(word.length, blankLevel);
                filled = new Set();
                busy = false;

                state.progress.spellBlankLevel = blankLevel;
                persist();

                updateHeader();
                renderSlots();
                renderChoices();
            }

            function start(wordIndex = 0, level = 1) {
                const words = currentWords();
                if (!words.length) {
                    Router.go('words', { onEnter: () => WordsScreen.sync() });
                    return;
                }
                const idx = Math.min(Math.max(0, wordIndex), words.length - 1);
                state.progress.spellWordIndex = idx;
                persist();
                setupLevel(words[idx], level);
            }

            function shakeActiveBlank() {
                const active = nextBlankIndex();
                if (active == null) return;
                const el = slotsEl.querySelector(`[data-index="${active}"]`);
                if (!el) return;
                el.classList.add('wrong-shake');
                setTimeout(() => el.classList.remove('wrong-shake'), 450);
            }

            async function onChoice(btn, letter) {
                if (busy || btn.disabled) return;

                const target = nextBlankIndex();
                if (target == null) return;

                const expected = currentWord[target];
                if (letter.toLowerCase() !== expected.toLowerCase()) {
                    SFX.popBang();
                    btn.classList.add('wrong');
                    shakeActiveBlank();
                    setTimeout(() => btn.classList.remove('wrong'), 450);
                    return;
                }

                busy = true;
                filled.add(target);
                TTS.speak(letter);
                renderSlots();

                await Feedback.flashCorrect();

                if (filled.size >= blankSet.size) {
                    [...choicesEl.querySelectorAll('.spell-choice')].forEach(b => { b.disabled = true; });
                    await finishLevel();
                } else {
                    renderChoices();
                    busy = false;
                }
            }

            async function finishLevel() {
                await TTS.speak(currentWord);

                const n = currentWord.length;
                const words = currentWords();
                const wi = state.progress.spellWordIndex || 0;

                if (blankLevel < n) {
                    // 같은 스테이지 안 — 빈칸 난이도 업: 자동 진행
                    setupLevel(currentWord, blankLevel + 1);
                    busy = false;
                    return;
                }

                addMoney(REWARD.SPELL_WORD_CLEAR);
                const isLastWord = wi >= words.length - 1;

                if (isLastWord) {
                    state.progress.stage3Done = true;
                    persist();
                    addMoney(REWARD.STAGE3_CLEAR);
                    Feedback.showStageClear({
                        title: '3단계 완료!',
                        message: `철자 완성 성공! +${REWARD.SPELL_WORD_CLEAR + REWARD.STAGE3_CLEAR} 머니 💰`,
                        emoji: '🎆',
                        buttonLabel: '확인',
                        onConfirm: () => {
                            busy = false;
                            Router.go('home');
                        }
                    });
                } else {
                    // 다음 단어 — 단계 내부 자동
                    state.progress.spellWordIndex = wi + 1;
                    state.progress.spellBlankLevel = 1;
                    persist();
                    start(wi + 1, 1);
                    busy = false;
                }
            }

            function bind() {
                document.getElementById('stage3RestartBtn').addEventListener('click', () => {
                    start(state.progress.spellWordIndex || 0, state.progress.spellBlankLevel || 1);
                });
                document.getElementById('stage3ToWordsBtn').addEventListener('click', () => {
                    Router.go('words', { onEnter: () => WordsScreen.sync() });
                });
                document.getElementById('stage3HomeBtn').addEventListener('click', () => Router.go('home'));
            }

            return { start, bind };
        })();

        /* =========================================================
         * Boot
         * ========================================================= */
        function init() {
            UI.updateMoney();
            UI.updatePlayerName();
            Home.bind();
            WordsScreen.bind();
            Stage1.bind();
            Stage2.bind();
            Stage3.bind();
            Router.boot();
        }

        init();

        window.PhonicsApp = {
            getState: () => JSON.parse(JSON.stringify(state)),
            addMoney,
            setMoney,
            Router,
            Storage,
            TTS,
            Feedback,
            Stage1,
            Stage2,
            Stage3,
            WordsScreen,
            WordPictures
        };
    </script>
</body>
